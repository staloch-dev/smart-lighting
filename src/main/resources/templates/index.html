<!doctype html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Iluminação Inteligente</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" th:href="@{/css/style.css}" />
  </head>
  <body class="dark" id="body">
    <div class="container">
      <!-- TOPBAR -->
      <div class="topbar">
        <div class="logo">lighting<span> / painel</span></div>
        <button class="theme-btn" onclick="toggleTheme()" id="theme-btn">
          ☀ claro
        </button>
      </div>

      <!-- HERO -->
      <div class="hero">
        <!-- Lâmpada -->
        <div class="lamp-wrap">
          <svg id="lamp-svg" width="110" height="135" viewBox="0 0 110 135">
            <defs>
              <radialGradient id="glow" cx="50%" cy="45%" r="50%">
                <stop offset="0%" stop-color="#6ee7b7" stop-opacity="0.5" />
                <stop offset="100%" stop-color="#6ee7b7" stop-opacity="0" />
              </radialGradient>
            </defs>
            <ellipse
              id="lamp-glow"
              cx="55"
              cy="60"
              rx="50"
              ry="50"
              fill="url(#glow)"
              opacity="0"
            />
            <path
              id="lamp-body"
              d="M36 74 Q24 54 30 36 Q38 16 55 15 Q72 16 80 36 Q86 54 74 74 Z"
              fill="#555"
            />
            <path
              id="lamp-fil"
              d="M46 66 Q50 56 55 63 Q60 56 64 66"
              fill="none"
              stroke="#aaa"
              stroke-width="1.5"
              stroke-linecap="round"
            />
            <rect x="42" y="74" width="26" height="7" rx="3" fill="#666" />
            <rect x="44" y="81" width="22" height="6" rx="3" fill="#5a5a5a" />
            <rect x="46" y="87" width="18" height="6" rx="3" fill="#505050" />
            <rect x="48" y="93" width="14" height="6" rx="3" fill="#484848" />
            <line
              x1="55"
              y1="15"
              x2="55"
              y2="4"
              stroke="#666"
              stroke-width="2.5"
            />
            <line
              x1="55"
              y1="4"
              x2="28"
              y2="4"
              stroke="#666"
              stroke-width="2.5"
            />
          </svg>
          <div class="lamp-label" id="lamp-label">Desligado</div>
        </div>

        <!-- Interruptor -->
        <form th:action="@{/interruptor}" method="post" id="switch-form">
          <input
            type="hidden"
            name="switchOn"
            id="switch-input"
            th:value="${state.switchOn() ? 'false' : 'true'}"
          />
          <div
            class="switch-wrap"
            onclick="document.getElementById('switch-form').submit()"
          >
            <svg width="70" height="110" viewBox="0 0 70 110">
              <rect
                x="5"
                y="5"
                width="60"
                height="90"
                rx="8"
                fill="#2a2a2e"
                stroke="#3a3a3e"
                stroke-width="1.5"
              />
              <circle
                cx="35"
                cy="17"
                r="4"
                fill="none"
                stroke="#3a3a3e"
                stroke-width="1"
              />
              <line
                x1="33"
                y1="17"
                x2="37"
                y2="17"
                stroke="#3a3a3e"
                stroke-width="0.8"
              />
              <line
                x1="35"
                y1="15"
                x2="35"
                y2="19"
                stroke="#3a3a3e"
                stroke-width="0.8"
              />
              <circle
                cx="35"
                cy="88"
                r="4"
                fill="none"
                stroke="#3a3a3e"
                stroke-width="1"
              />
              <line
                x1="33"
                y1="88"
                x2="37"
                y2="88"
                stroke="#3a3a3e"
                stroke-width="0.8"
              />
              <line
                x1="35"
                y1="86"
                x2="35"
                y2="90"
                stroke="#3a3a3e"
                stroke-width="0.8"
              />
              <rect
                x="22"
                y="28"
                width="26"
                height="50"
                rx="6"
                fill="#3a3a3e"
              />
              <!-- alavanca: cima = OFF, baixo = ON -->
              <rect
                id="lever"
                th:attr="y=${state.switchOn() ? '46' : '30'}"
                x="24"
                width="22"
                height="26"
                rx="5"
                th:fill="${state.switchOn() ? '#6ee7b7' : '#555'}"
              />
              <text
                x="35"
                y="43"
                text-anchor="middle"
                font-size="9"
                font-family="Poppins,sans-serif"
                font-weight="600"
                th:fill="${state.switchOn() ? '#6ee7b7' : '#888'}"
              >
                ON
              </text>
              <text
                x="35"
                y="68"
                text-anchor="middle"
                font-size="9"
                font-family="Poppins,sans-serif"
                font-weight="600"
                th:fill="${state.switchOn() ? '#888' : '#6ee7b7'}"
              >
                OFF
              </text>
            </svg>
            <div
              class="lamp-label"
              th:text="${state.switchOn() ? 'Ligado' : 'Desligado'}"
            ></div>
          </div>
        </form>

        <!-- Info -->
        <div class="hero-info">
          <div
            class="hero-status"
            th:text="${state.ledOn() ? 'Ligado' : 'Desligado'}"
            th:classappend="${state.ledOn() ? ' on' : ' off'}"
          ></div>
          <div
            class="hero-sub"
            th:text="${!state.switchOn() ? 'Sistema desligado' :
                           (state.mode().name() == 'AUTOMATIC' ? 'Sensor controlando o LED' : 'Controle manual ativo')}"
          ></div>
          <div
            class="hero-mode"
            th:text="${state.mode().name() == 'AUTOMATIC' ? 'Automático' : 'Manual'}"
          ></div>
        </div>
      </div>

      <!-- MÉTRICAS -->
      <div class="grid3">
        <div class="metric">
          <div class="metric-label">Luminosidade</div>
          <div
            class="metric-value"
            id="lum-val"
            th:text="${state.luminosity()}"
          ></div>
          <div class="metric-sub">de 4095</div>
        </div>
        <div class="metric">
          <div class="metric-label">LED</div>
          <div
            class="metric-value"
            id="led-val"
            th:text="${state.ledOn() ? 'Ligado' : 'Desligado'}"
            th:classappend="${state.ledOn() ? ' on' : ' off'}"
          ></div>
          <div class="metric-sub">estado atual</div>
        </div>
        <div class="metric">
          <div class="metric-label">Threshold</div>
          <div class="metric-value" th:text="${state.threshold()}"></div>
          <div class="metric-sub">limite</div>
        </div>
      </div>

      <!-- CONTROLES -->
      <div class="grid-main">
        <!-- Modo -->
        <div class="card">
          <div class="card-title">Modo de operação</div>
          <div class="tog-row">
            <form th:action="@{/modo}" method="post" style="flex: 1">
              <input type="hidden" name="mode" value="AUTOMATIC" />
              <button
                type="submit"
                class="tog"
                th:classappend="${state.mode().name() == 'AUTOMATIC' ? ' active' : ''}"
              >
                Automático
              </button>
            </form>
            <form th:action="@{/modo}" method="post" style="flex: 1">
              <input type="hidden" name="mode" value="MANUAL" />
              <button
                type="submit"
                class="tog"
                th:classappend="${state.mode().name() == 'MANUAL' ? ' active' : ''}"
              >
                Manual
              </button>
            </form>
          </div>
        </div>

        <!-- Threshold -->
        <div class="card">
          <div class="card-title">Threshold</div>
          <form th:action="@{/threshold}" method="post">
            <div class="range-top">
              <span>0 — 4095</span>
              <strong id="thr-display" th:text="${state.threshold()}"></strong>
            </div>
            <input
              type="range"
              name="threshold"
              min="0"
              max="4095"
              step="1"
              th:value="${state.threshold()}"
              oninput="
                document.getElementById('thr-display').textContent = this.value
              "
            />
            <button type="submit" class="save-btn">Salvar</button>
          </form>
        </div>
      </div>
    </div>

    <script th:src="@{/js/app.js}"></script>
  </body>
</html>
